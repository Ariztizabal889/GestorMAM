<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas Generales</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-10">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center mb-8 sticky top-0 z-50">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-blue-600 font-bold hover:underline">⬅ Volver</a>
            <h1 class="text-xl font-bold text-gray-800">📝 Notas Generales</h1>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4">
        <div class="bg-white p-4 rounded-xl shadow-md border mb-8 focus-within:ring-2 focus-within:ring-blue-400">
            <form id="form-nota-independiente" class="space-y-3">
                <input type="text" id="nota-title" placeholder="Título de la nota..." class="w-full font-bold border-none focus:ring-0 text-lg outline-none bg-transparent">
                <textarea id="nota-content" required placeholder="Escribe algo importante..." class="w-full border-none focus:ring-0 outline-none resize-none bg-transparent" rows="3"></textarea>
                
                <div class="flex justify-between items-center pt-3 border-t">
                    <div class="flex space-x-2">
                        <input type="radio" name="color" value="#ffffff" checked class="hidden peer/w" id="c-w"><label for="c-w" class="w-6 h-6 rounded-full bg-white border cursor-pointer peer-checked/w:ring-2 ring-blue-500"></label>
                        <input type="radio" name="color" value="#fef08a" class="hidden peer/y" id="c-y"><label for="c-y" class="w-6 h-6 rounded-full bg-yellow-200 cursor-pointer peer-checked/y:ring-2 ring-blue-500"></label>
                        <input type="radio" name="color" value="#bbf7d0" class="hidden peer/g" id="c-g"><label for="c-g" class="w-6 h-6 rounded-full bg-green-200 cursor-pointer peer-checked/g:ring-2 ring-blue-500"></label>
                    </div>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-700">Guardar Nota</button>
                </div>
            </form>
        </div>

        <div id="contenedor-notas-gen" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <p class="text-center col-span-full text-gray-500">Cargando tus apuntes...</p>
        </div>
    </div>

    <script>
        const API_URL = "https://gestormam.onrender.com";
        const USER_ID = localStorage.getItem('user_id');

        async function cargarNotasGenerales() {
            try {
                // Llamamos a un nuevo endpoint que filtre por media_id IS NULL
                // O podemos traer todas y filtrar en JS por ahora
                const res = await fetch(`${API_URL}/notas/usuario/${USER_ID}`);
                const data = await res.json();
                
                const contenedor = document.getElementById('contenedor-notas-gen');
                contenedor.innerHTML = "";

                // Filtramos solo las que NO tienen media_id (independientes)
                const notasGenerales = data.datos.filter(n => n.media_id === null);

                if(notasGenerales.length === 0) {
                    contenedor.innerHTML = "<p class='text-center col-span-full'>No tienes notas independientes aún.</p>";
                    return;
                }

                notasGenerales.forEach(nota => {
                    contenedor.innerHTML += `
                        <div class="p-4 rounded-xl shadow-sm border group relative" style="background-color: ${nota.color}">
                            <button onclick="eliminarNota('${nota.id}')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-red-500 text-xs">Borrar</button>
                            ${nota.title ? `<h4 class="font-bold mb-2">${nota.title}</h4>` : ''}
                            <p class="text-sm text-gray-700 whitespace-pre-wrap">${nota.content}</p>
                        </div>
                    `;
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('form-nota-independiente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nuevaNota = {
                user_id: USER_ID,
                media_id: null, // IMPORTANTE: Así indicamos que es independiente
                title: document.getElementById('nota-title').value || null,
                content: document.getElementById('nota-content').value,
                color: document.querySelector('input[name="color"]:checked').value
            };
            await fetch(`${API_URL}/notas/`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(nuevaNota)
            });
            document.getElementById('form-nota-independiente').reset();
            cargarNotasGenerales();
        });

        async function eliminarNota(id) {
            if(confirm("¿Borrar nota?")) {
                await fetch(`${API_URL}/notas/${id}`, { method: 'DELETE' });
                cargarNotasGenerales();
            }
        }

        cargarNotasGenerales();
    </script>
</body>
</html>
