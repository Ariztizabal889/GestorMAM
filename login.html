<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor de Entretenimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
        <h2 class="text-3xl font-black mb-2 text-center text-gray-800 italic uppercase">🎬 Bienvenida/o</h2>
        <p class="text-center text-gray-400 text-sm mb-8 uppercase tracking-widest font-bold">Inicia sesión para gestionar</p>
        
        <form id="formulario-login" class="space-y-5">
            <div>
                <label class="block text-gray-500 text-[10px] font-black uppercase mb-1 ml-1">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="tu@email.com" class="w-full px-4 py-3 border-2 border-gray-100 rounded-2xl focus:outline-none focus:border-blue-500 transition-all font-semibold">
            </div>
            <div>
                <label class="block text-gray-500 text-[10px] font-black uppercase mb-1 ml-1">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-3 border-2 border-gray-100 rounded-2xl focus:outline-none focus:border-blue-500 transition-all font-semibold">
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200 uppercase tracking-widest active:scale-95">
                Entrar a la Biblioteca
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-50 text-center">
            <p class="text-sm text-gray-400 font-bold uppercase tracking-tighter">
                ¿Nuevo por aquí? 
                <button id="btn-registrar" class="text-blue-600 font-black hover:underline ml-1">Crea tu cuenta</button>
            </p>
        </div>

        <div id="mensaje" class="mt-6 text-center text-xs font-black hidden p-3 rounded-xl uppercase tracking-widest"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://oaalrxqoqvrdmhinuodd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hYWxyeHFvcXZyZG1oaW51b2RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzI4OTcsImV4cCI6MjA5MDQ0ODg5N30.wBUmfFWoqlY5SnF_h1l1oI5MyluTYZHMUwxrbtu49rc';
        
        const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const divMensaje = document.getElementById('mensaje');

        function mostrarMensaje(texto, esError = false) {
            divMensaje.textContent = texto;
            divMensaje.className = `mt-6 text-center text-xs font-black p-3 rounded-xl block ${esError ? 'bg-red-50 text-red-500' : 'bg-green-50 text-green-600'}`;
            divMensaje.classList.remove('hidden');
        }

        // REGISTRO
        document.getElementById('btn-registrar').addEventListener('click', async (e) => {
            e.preventDefault(); 
            const email = emailInput.value;
            const password = passwordInput.value;

            if (!email || !password) return mostrarMensaje('Escribe un correo y clave', true);
            
            mostrarMensaje('Procesando registro...', false);
            const { data, error } = await clienteSupabase.auth.signUp({ email, password });

            if (error) {
                mostrarMensaje(`Error: ${error.message}`, true);
            } else {
                if (data.user && data.session === null) {
                    mostrarMensaje('¡Revisa tu email para confirmar tu cuenta!', false);
                } else {
                    mostrarMensaje('¡Cuenta creada! Ya puedes iniciar sesión.', false);
                }
            }
        });

        // INICIO DE SESIÓN
        document.getElementById('formulario-login').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            mostrarMensaje('Iniciando sesión...', false);

            const { data, error } = await clienteSupabase.auth.signInWithPassword({
                email: emailInput.value,
                password: passwordInput.value,
            });

            if (error) {
                mostrarMensaje('Credenciales incorrectas', true);
            } else {
                mostrarMensaje('¡Éxito! Redirigiendo...', false);
                // Guardamos solo el ID para que el index lo reconozca
                localStorage.setItem('user_id', data.user.id);
                
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 800);
            }
        });

        // --- ELIMINADO EL WINDOW.ONLOAD QUE REDIRIGÍA AUTOMÁTICAMENTE ---
        // Esto evita que al cerrar sesión te vuelva a meter solo.
    </script>
</body>
</html>
