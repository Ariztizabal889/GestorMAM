<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Global - Importación Directa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .book-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .book-card:hover { transform: translateY(-12px); shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        body { transition: background-color 0.3s ease; }
        #toast { transition: all 0.5s ease; transform: translateY(100px); opacity: 0; }
        #toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 min-h-screen font-sans text-slate-900 dark:text-slate-100">

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] bg-green-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-xs shadow-2xl flex items-center">
        <span class="mr-2">📚</span> ¡Libro añadido a tu biblioteca!
    </div>

    <nav class="p-6 max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center sticky top-0 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md z-40 gap-4 border-b dark:border-slate-800">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="bg-white dark:bg-slate-900 p-3 rounded-2xl shadow-sm hover:scale-110 transition border dark:border-slate-800">🏠</a>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Catalogos <span class="text-blue-600">Libros</span></h1>
        </div>

        <div class="flex-1 max-w-xl w-full flex bg-white dark:bg-slate-900 rounded-2xl shadow-sm border dark:border-slate-800 p-1">
            <input type="text" id="input-busqueda" onkeyup="if(event.key === 'Enter') iniciarBusqueda()" placeholder="Buscar título, autor o tema..." class="flex-1 bg-transparent px-4 py-2 outline-none font-bold">
            <button onclick="iniciarBusqueda()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-blue-700 transition-all">Buscar</button>
        </div>

        <div class="flex items-center space-x-2 bg-white dark:bg-slate-900 p-2 rounded-2xl shadow-inner border dark:border-slate-800">
            <span class="text-[10px] font-black uppercase text-slate-400 px-2">Página <span id="label-pagina">1</span></span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div id="grid-libros" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-8 min-h-[400px]">
            </div>

        <div class="flex justify-center items-center space-x-6 mt-20 pb-20">
            <button onclick="cambiarPagina(-1)" id="btn-prev" class="bg-white dark:bg-slate-800 text-slate-400 font-black py-4 px-8 rounded-2xl shadow-lg uppercase text-[10px] tracking-widest disabled:opacity-30 disabled:cursor-not-allowed transition-all">
                ⬅ Anterior
            </button>
            <button onclick="cambiarPagina(1)" id="btn-next" class="bg-blue-600 hover:bg-blue-700 text-white font-black py-4 px-10 rounded-2xl shadow-xl shadow-blue-500/20 uppercase text-[10px] tracking-widest transition-all active:scale-95">
                Siguiente ➡
            </button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-[3rem] max-w-sm w-full shadow-2xl border dark:border-slate-800 text-center">
            <img id="m-img" src="" class="w-40 mx-auto rounded-2xl shadow-2xl mb-6 aspect-[2/3] object-cover bg-slate-200">
            <h3 id="m-title" class="text-xl font-black uppercase mb-2 italic leading-tight"></h3>
            <p id="m-author" class="text-blue-600 font-bold uppercase text-[10px] tracking-widest mb-2"></p>
            <p id="m-pages" class="text-slate-400 font-bold text-[9px] uppercase mb-8"></p>
            
            <div class="flex flex-col gap-2">
                <button id="btn-confirmar" onclick="confirmarImportacion()" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest shadow-lg transition-all">
                    Añadir a mi Colección
                </button>
                <button onclick="cerrarModal()" class="w-full py-4 text-slate-400 font-bold uppercase text-[10px] hover:text-red-500 transition-colors">
                    Cancelar
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_LOCAL = "https://gestormam.onrender.com";
        const USER_ID = localStorage.getItem('user_id');
        
        let libroSeleccionado = null;
        let paginaActual = 0;
        let queryActual = ""; // Variable para guardar lo que buscamos
        const librosPorPagina = 18;

        window.onload = () => {
            if (!USER_ID) window.location.href = 'login.html';
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            cargarCatalogo();
        };

        function iniciarBusqueda() {
            queryActual = document.getElementById('input-busqueda').value.trim();
            paginaActual = 0; // Reset a página 1
            cargarCatalogo();
        }

        async function cargarCatalogo() {
            const grid = document.getElementById('grid-libros');
            const startIndex = paginaActual * librosPorPagina;
            grid.innerHTML = `<div class="col-span-full text-center py-20 font-black animate-pulse uppercase tracking-widest text-blue-500">Sincronizando con Google Books...</div>`;
            
            try {
                // Si queryActual está vacío, busca novedades (fiction), si no, busca lo que escribió el usuario
                const q = queryActual ? encodeURIComponent(queryActual) : "subject:fiction";
                const url = `https://www.googleapis.com/books/v1/volumes?q=${q}&orderBy=relevance&startIndex=${startIndex}&maxResults=${librosPorPagina}&langRestrict=es`;
                
                const res = await fetch(url);
                const data = await res.json();

                grid.innerHTML = "";
                if (!data.items) {
                    grid.innerHTML = `<p class="col-span-full text-center text-red-500 font-black uppercase">No se encontraron más resultados para "${queryActual}"</p>`;
                    return;
                }

                data.items.forEach(item => {
                    const info = item.volumeInfo;
                    const thumb = info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : 'https://via.placeholder.com/300x450?text=Sin+Portada';
                    
                    const div = document.createElement('div');
                    div.className = "book-card cursor-pointer group flex flex-col";
                    div.onclick = () => verDetalle(item);
                    div.innerHTML = `
                        <div class="relative overflow-hidden rounded-[2rem] shadow-xl mb-4 aspect-[2/3] bg-slate-200">
                            <img src="${thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" referrerpolicy="no-referrer">
                        </div>
                        <h3 class="text-[10px] font-black uppercase text-center line-clamp-2 px-1">${info.title}</h3>
                    `;
                    grid.appendChild(div);
                });

                document.getElementById('label-pagina').textContent = paginaActual + 1;
                document.getElementById('btn-prev').disabled = paginaActual === 0;

            } catch (e) { console.error(e); }
        }

        function cambiarPagina(dir) { paginaActual += dir; cargarCatalogo(); }

        function verDetalle(item) {
            libroSeleccionado = item;
            const info = item.volumeInfo;
            document.getElementById('m-img').src = info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : 'https://via.placeholder.com/300x450';
            document.getElementById('m-title').textContent = info.title;
            document.getElementById('m-author').textContent = info.authors ? info.authors.join(', ') : 'Anónimo';
            document.getElementById('m-pages').textContent = (info.pageCount || '???') + " PÁGINAS";
            document.getElementById('modal').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }

        function mostrarNotificacion() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function confirmarImportacion() {
            const btn = document.getElementById('btn-confirmar');
            const info = libroSeleccionado.volumeInfo;
            btn.disabled = true;
            btn.innerHTML = "Guardando...";

            const payload = {
                user_id: USER_ID,
                title: info.title,
                media_type: 'Libro',
                cover_image_url: info.imageLinks ? info.imageLinks.thumbnail.replace('http:', 'https:') : null,
                total_pages: info.pageCount || 0,
                status: 'pendiente',
                current_page: 0
            };

            try {
                const res = await fetch(`${API_LOCAL}/media/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    cerrarModal();
                    mostrarNotificacion();
                }
            } catch (e) { alert("Error al conectar con el servidor."); }
            finally {
                btn.disabled = false;
                btn.innerHTML = "Añadir a mi Colección";
            }
        }
    </script>
</body>
</html>
