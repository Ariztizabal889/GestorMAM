<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Notas - Gestor Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .nota-card { transition: all 0.2s ease; }
        .nota-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        body { transition: background-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 pb-20 text-gray-900 dark:text-gray-100">

    <nav class="bg-white dark:bg-gray-800 shadow-sm p-4 flex justify-between items-center mb-8 sticky top-0 z-50 transition-colors">
        <div class="flex items-center space-x-4">
            <a href="index.html" class="text-blue-600 dark:text-blue-400 font-black px-4 py-2 rounded-xl hover:bg-blue-50 dark:hover:bg-gray-700 transition uppercase text-xs tracking-widest">
                ⬅ Volver
            </a>
            <h1 class="text-xl font-black text-gray-800 dark:text-white italic uppercase">📝 Mis Notas</h1>
        </div>
        <button onclick="toggleDarkMode()" id="dark-mode-btn" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700 text-xl transition-all">🌙</button>
    </nav>

    <div class="max-w-5xl mx-auto px-4">
        
        <div id="area-nota" class="bg-white dark:bg-gray-800 rounded-3xl shadow-md border-2 border-transparent mb-12 p-6 transition-all duration-300">
            <form id="form-nota-general" class="space-y-4">
                <input type="text" id="nota-title" placeholder="Título de la nota..." 
                    class="w-full font-black text-2xl border-none focus:ring-0 outline-none bg-transparent placeholder-gray-300 dark:placeholder-gray-600 italic uppercase">
                
                <textarea id="nota-content" required placeholder="Escribe algo increíble..." 
                    class="w-full border-none focus:ring-0 outline-none resize-none bg-transparent text-gray-700 dark:text-gray-300 leading-relaxed" rows="4"></textarea>
                
                <div class="flex flex-col sm:flex-row justify-between items-center pt-4 border-t border-gray-50 dark:border-gray-700 gap-4">
                    <div class="flex space-x-3">
                        <label class="cursor-pointer"><input type="radio" name="color" value="#ffffff" checked class="hidden peer"><div class="w-8 h-8 rounded-full bg-white border-2 border-gray-200 peer-checked:border-blue-500 transition-all"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="color" value="#fef08a" class="hidden peer"><div class="w-8 h-8 rounded-full bg-yellow-100 border-2 border-transparent peer-checked:border-blue-500 transition-all"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="color" value="#bfdbfe" class="hidden peer"><div class="w-8 h-8 rounded-full bg-blue-100 border-2 border-transparent peer-checked:border-blue-500 transition-all"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="color" value="#bbf7d0" class="hidden peer"><div class="w-8 h-8 rounded-full bg-green-100 border-2 border-transparent peer-checked:border-blue-500 transition-all"></div></label>
                        <label class="cursor-pointer"><input type="radio" name="color" value="#fbcfe8" class="hidden peer"><div class="w-8 h-8 rounded-full bg-pink-100 border-2 border-transparent peer-checked:border-blue-500 transition-all"></div></label>
                    </div>

                    <div class="flex space-x-3 w-full sm:w-auto">
                        <button type="button" id="btn-cancelar" class="hidden flex-1 sm:flex-none text-gray-400 font-black uppercase text-xs px-6 py-3 tracking-widest" onclick="cancelarEdicion()">
                            Cancelar
                        </button>
                        <button type="submit" id="btn-submit" class="flex-1 sm:flex-none bg-gray-900 dark:bg-blue-600 text-white px-10 py-3 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-lg hover:bg-blue-600 dark:hover:bg-blue-500 transition-all active:scale-95">
                            Guardar Nota
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div id="muro-notas" class="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6"></div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        const USER_ID = localStorage.getItem('user_id');
        let idNotaEnEdicion = null;

        if (!USER_ID) window.location.href = 'login.html';

        // --- LÓGICA MODO OSCURO (Sincronizada con index) ---
        function toggleDarkMode() {
            const html = document.documentElement;
            const btn = document.getElementById('dark-mode-btn');
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            btn.innerHTML = isDark ? '☀️' : '🌙';
        }

        // Aplicar tema al cargar
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            document.getElementById('dark-mode-btn').innerHTML = '☀️';
        }

        // CARGAR NOTAS
        async function cargarNotas() {
            try {
                const res = await fetch(`${API_URL}/notas/usuario/${USER_ID}`);
                const data = await res.json();
                const contenedor = document.getElementById('muro-notas');
                contenedor.innerHTML = "";

                const notasGenerales = data.datos.filter(n => n.media_id === null);

                if (notasGenerales.length === 0) {
                    contenedor.innerHTML = `<p class="col-span-full text-center text-gray-400 font-black uppercase text-xs tracking-widest py-20">No tienes notas guardadas</p>`;
                    return;
                }

                notasGenerales.forEach(nota => {
                    const div = document.createElement('div');
                    // Ajuste de opacidad en dark mode para que el color de fondo no sea tan chillón
                    div.className = "nota-card break-inside-avoid p-6 rounded-[2rem] border border-gray-100 dark:border-gray-700 shadow-sm relative group cursor-pointer mb-6 transition-colors";
                    
                    // Aplicar color de fondo
                    div.style.backgroundColor = nota.color || '#ffffff';
                    
                    // Si el modo oscuro está activo y el fondo es blanco puro, lo oscurecemos un poco
                    if (document.documentElement.classList.contains('dark') && (nota.color === '#ffffff' || !nota.color)) {
                        div.style.backgroundColor = '#1f2937'; // gray-800
                    }

                    div.onclick = (e) => { 
                        if(e.target.tagName !== 'BUTTON') prepararEdicion(nota); 
                    };

                    div.innerHTML = `
                        <button onclick="eliminarNota('${nota.id}')" class="absolute top-4 right-4 opacity-0 group-hover:opacity-100 bg-white/50 dark:bg-black/30 hover:bg-red-500 hover:text-white w-8 h-8 rounded-full transition-all flex items-center justify-center text-xs shadow-sm">🗑️</button>
                        <h4 class="n-title font-black text-gray-900 dark:text-white mb-3 uppercase italic leading-tight"></h4>
                        <p class="n-content text-gray-700 dark:text-gray-300 text-sm whitespace-pre-wrap leading-relaxed"></p>
                    `;

                    if (nota.title) {
                        div.querySelector('.n-title').textContent = nota.title;
                    } else {
                        div.querySelector('.n-title').remove();
                    }
                    div.querySelector('.n-content').textContent = nota.content;
                    
                    contenedor.appendChild(div);
                });
            } catch (e) { 
                console.error("Error al cargar notas:", e); 
            }
        }

        // PREPARAR EDICIÓN
        function prepararEdicion(n) {
            idNotaEnEdicion = n.id;
            document.getElementById('nota-title').value = n.title || "";
            document.getElementById('nota-content').value = n.content;
            const radio = document.querySelector(`input[name="color"][value="${n.color || '#ffffff'}"]`);
            if (radio) radio.checked = true;

            document.getElementById('btn-submit').textContent = "Actualizar Nota";
            document.getElementById('btn-cancelar').classList.remove('hidden');
            document.getElementById('area-nota').classList.add('ring-4', 'ring-blue-100', 'dark:ring-blue-900', 'border-blue-400');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicion() {
            idNotaEnEdicion = null;
            document.getElementById('form-nota-general').reset();
            document.getElementById('btn-submit').textContent = "Guardar Nota";
            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('area-nota').classList.remove('ring-4', 'ring-blue-100', 'dark:ring-blue-900', 'border-blue-400');
        }

        document.getElementById('form-nota-general').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datos = {
                user_id: USER_ID,
                title: document.getElementById('nota-title').value || null,
                content: document.getElementById('nota-content').value,
                color: document.querySelector('input[name="color"]:checked').value,
                media_id: null,
                is_pinned: false
            };

            const url = idNotaEnEdicion ? `${API_URL}/notas/${idNotaEnEdicion}` : `${API_URL}/notas/`;
            const metodo = idNotaEnEdicion ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { 
                    method: metodo, 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(datos) 
                });
                if (res.ok) {
                    cancelarEdicion(); 
                    cargarNotas();
                }
            } catch (error) { console.error(error); }
        });

        async function eliminarNota(id) {
            if (confirm("¿Estás seguro de eliminar esta nota?")) {
                try {
                    const res = await fetch(`${API_URL}/notas/${id}`, { method: 'DELETE' });
                    if (res.ok) cargarNotas();
                } catch (e) { console.error(e); }
            }
        }

        cargarNotas();
    </script>
</body>
</html>
